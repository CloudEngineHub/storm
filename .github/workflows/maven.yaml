name: Java CI with Maven

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  # Compile once on JDK 25 and share artifacts with test jobs
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.10'
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
      - name: Run distribution packaging script tests
        run: python3 -B storm-dist/binary/final-package/src/main/scripts/test_dedup_libs.py
      - name: Ensure a clean state without storm artifacts
        run: rm -rf ~/.m2/repository/org/apache/storm
      - name: Build project (compile + install, skip tests)
        run: /bin/bash ./dev-tools/gitact/gitact-install.sh `pwd`
      - name: RAT license check
        run: |
          rm -f install.txt storm-shaded-deps/install-shade.txt
          mvn --batch-mode apache-rat:check -Prat
      - name: Upload Storm artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storm-build-artifacts
          path: ~/.m2/repository/org/apache/storm/
          retention-days: 1

  # Run tests on multiple JDKs using pre-built artifacts from the build job
  test:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 45
    strategy:
      matrix:
        java: [ 25 ]
        module: [ Client, Server, Core, External, Integration-Test ]
        experimental: [false]
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Download Storm artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: storm-build-artifacts
          path: ~/.m2/repository/org/apache/storm/
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.10'
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Run tests
        run: |
          export JDK_VERSION=${{ matrix.java }}
          export USER=github
          /bin/bash ./dev-tools/gitact/gitact-test.sh `pwd` ${{ matrix.module }};
